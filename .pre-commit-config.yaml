repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.11
    hooks:
      - id: ruff
        files: ^apps/(dashboard|sensor-emulator)/

  - repo: https://github.com/golangci/golangci-lint
    rev: v1.55.2
    hooks:
      - id: golangci-lint
        args: ['--config=.golangci.yml']
        files: ^apps/ingestion-api/

  - repo: https://github.com/terraform-docs/terraform-docs
    rev: v0.16.0
    hooks:
      - id: terraform-docs-go
        files: ^infrastructure/terraform/

  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.85.0
    hooks:
      - id: terraform_fmt
        files: ^infrastructure/terraform/
      - id: terraform_validate
        args: ['--hook-config=--retries=2']
        files: ^infrastructure/terraform/

ci:
  autofix_commit_msg: 'ci: auto-fix pre-commit violations'
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: 'ci: auto-update pre-commit hooks'
  autoupdate_schedule: weekly
  skip: [golangci-lint, terraform-docs-go]  # Skip in CI; run in GitHub Actions instead
  stages: [commit]
