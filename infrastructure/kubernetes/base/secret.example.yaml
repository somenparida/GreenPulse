# Create the real Secret without committing credentials, e.g.:
#   kubectl create secret generic greenpulse-db \
#     --namespace=greenpulse \
#     --from-literal=DATABASE_URL='${DATABASE_URL}'
#
# Or render with envsubst after exporting DATABASE_URL:
#   envsubst < secret.example.yaml | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: greenpulse-db
  namespace: greenpulse
type: Opaque
stringData:
  DATABASE_URL: "${DATABASE_URL}"
