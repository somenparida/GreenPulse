apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion-api
  namespace: greenpulse
  labels:
    app.kubernetes.io/name: ingestion-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ingestion-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ingestion-api
    spec:
      containers:
        - name: ingestion-api
          # Replace with your registry path after CI build, e.g. ghcr.io/${GITHUB_ORG}/greenpulse-ingestion-api:${IMAGE_TAG}
          image: ghcr.io/PLACEHOLDER_ORG/greenpulse-ingestion-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: greenpulse-db
                  key: DATABASE_URL
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ingestion-api
  namespace: greenpulse
  labels:
    app.kubernetes.io/name: ingestion-api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: ingestion-api
  ports:
    - name: http
      port: 8080
      targetPort: http
