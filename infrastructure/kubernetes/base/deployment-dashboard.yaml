apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: greenpulse
  labels:
    app.kubernetes.io/name: dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dashboard
    spec:
      containers:
        - name: dashboard
          image: ghcr.io/PLACEHOLDER_ORG/greenpulse-dashboard:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8501
              name: http
          env:
            - name: INGESTION_API_URL
              value: "http://ingestion-api.greenpulse.svc.cluster.local:8080"
            - name: DASHBOARD_REFRESH_SECONDS
              value: "10"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: http
            initialDelaySeconds: 25
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: greenpulse
  labels:
    app.kubernetes.io/name: dashboard
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: dashboard
  ports:
    - name: http
      port: 8501
      targetPort: http
